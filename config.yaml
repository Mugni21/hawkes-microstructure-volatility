data:
  symbols: ["BTCUSDT", "ETHUSDT"]
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  timezone: "UTC"
  interval_seconds: 10

hawkes:
  fit_window:
    start_hour: 5
    duration_minutes: 30
  max_events_per_side: 1500
  cap_mode: uniform
  shared_beta: true
  optimizer_maxiter: 75
  stability_penalty: 100000.0

forecasting:
  horizons_seconds: [10, 30, 60, 300]
  train_fraction: 0.7
  rolling_window_seconds: 300
